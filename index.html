<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Mein Dashboard">
<meta name="theme-color" content="#DBEAFE">
<title>Mein Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --app-bg:#F0F6FF;--card-bg:#FFFFFF;--header-bg:#FFFFFF;
  --text-1:#1E3A5F;--text-2:#4A6FA5;--text-3:#8AADD4;
  --border:#D6E8FF;--border2:#B8D4F8;
  --accent:#3B82F6;--accent-dark:#1D4ED8;--accent-light:#EBF4FF;
  --nav-bg:#DBEAFE;--nav-inactive:#5B8DB8;--nav-active:#1D4ED8;
  --btn:#1E3A5F;--btn-fg:#FFFFFF;
}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;background:var(--app-bg)}
.app{max-width:430px;margin:0 auto;background:var(--app-bg);height:100vh;display:flex;flex-direction:column;overflow:hidden}
.header{background:var(--header-bg);padding:env(safe-area-inset-top,16px) 20px 12px;padding-top:max(env(safe-area-inset-top),16px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.header-title{font-size:18px;font-weight:700;color:var(--text-1)}
.header-sub{font-size:11px;color:var(--text-3);margin-top:2px}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:8px}
.nav{background:var(--nav-bg);border-top:2px solid var(--border2);display:flex;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0)}
.nav-btn{flex:1;border:none;background:none;padding:9px 2px 7px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--nav-inactive);font-size:9px;font-family:inherit;font-weight:600;-webkit-tap-highlight-color:transparent}
.nav-btn.active{color:var(--nav-active)}
.nav-btn.active .nic{background:#BFDBFE;border-radius:10px}
.nic{padding:3px 8px 2px;border-radius:10px}
.nav-btn svg{width:21px;height:21px;stroke-width:2;display:block}
.card{background:var(--card-bg);border-radius:14px;border:1px solid var(--border);margin:10px 14px;overflow:hidden}
.status-bar{display:flex;align-items:center;gap:8px;background:var(--accent-light);border-bottom:1px solid var(--border);padding:7px 14px;flex-wrap:wrap}
.status-text{font-size:11px;color:var(--text-2)}
.badge{font-size:10.5px;padding:2px 8px;border-radius:20px;font-weight:600}
.badge-red{background:#FFF1F1;color:#DC2626}
.badge-amber{background:#FFFBEB;color:#D97706}
.badge-green{background:#F0FDF4;color:#16A34A}
.badge-gray{background:#E8F0FB;color:var(--text-2)}
.empty-state{text-align:center;padding:40px 20px;color:var(--text-2);font-size:13px;line-height:1.8}
/* Mail */
.mail-item{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;gap:11px;cursor:pointer}
.mail-item:last-child{border-bottom:none}
.mail-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);margin-top:5px;flex-shrink:0}
.mail-dot.read{background:transparent;border:1px solid var(--border2)}
.mail-body{flex:1;min-width:0}
.mail-from{font-size:13px;font-weight:700;color:var(--text-1);display:flex;justify-content:space-between;align-items:center;gap:6px}
.mail-time{font-size:10.5px;color:var(--text-3);font-weight:400;flex-shrink:0}
.mail-subject{font-size:12.5px;color:var(--text-1);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mail-preview{font-size:11.5px;color:var(--text-2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* Kalender */
.date-nav{display:flex;align-items:center;justify-content:space-between;padding:10px 16px}
.dnbtn{border:none;background:var(--btn);color:#fff;font-size:20px;padding:4px 16px;border-radius:10px;cursor:pointer;font-weight:700;line-height:1.4}
.date-label{font-size:14px;font-weight:700;color:var(--text-1)}
.cal-item{padding:11px 16px;display:flex;gap:13px;align-items:center;border-bottom:1px solid var(--border)}
.cal-item:last-child{border-bottom:none}
.cal-tc{text-align:right;min-width:42px}
.cal-start{font-size:12.5px;font-weight:700;color:var(--text-1)}
.cal-end{font-size:10.5px;color:var(--text-3)}
.cal-stripe{width:3px;border-radius:3px;align-self:stretch;flex-shrink:0;min-height:32px}
.cal-info{flex:1;min-width:0}
.cal-title{font-size:13px;font-weight:600;color:var(--text-1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-meta{font-size:11px;color:var(--text-2);margin-top:2px}
/* Notizen */
.note-card{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:flex-start}
.note-card:last-child{border-bottom:none}
.note-title{font-size:13px;font-weight:700;color:var(--text-1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.note-body{font-size:12px;color:var(--text-2);margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.note-date{font-size:10px;color:var(--text-3);margin-top:4px}
/* Editor */
.editor-wrap{background:var(--card-bg);min-height:100%;display:flex;flex-direction:column}
.editor-topbar{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px}
.title-inp{border:none;background:transparent;font-size:17px;font-weight:700;color:var(--text-1);font-family:inherit;outline:none;padding:16px 16px 8px;width:100%}
.body-inp{border:none;background:transparent;font-size:14px;color:var(--text-1);font-family:inherit;outline:none;padding:0 16px;width:100%;resize:none;min-height:300px;line-height:1.7}
/* Lernen - Ordner */
.row-item{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:center}
.row-item:last-child{border-bottom:none}
.row-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;background:var(--accent-light)}
.row-body{flex:1;min-width:0}
.row-title{font-size:13.5px;font-weight:700;color:var(--text-1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-sub{font-size:11.5px;color:var(--text-2);margin-top:2px}
.row-arr{color:var(--accent);font-size:20px;font-weight:700;flex-shrink:0}
/* Hausaufgaben */
.hw-item{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:flex-start}
.hw-item:last-child{border-bottom:none}
.hw-chk{width:22px;height:22px;border-radius:50%;border:2px solid var(--accent);cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.hw-chk.done{background:var(--btn);border-color:var(--btn)}
.hw-chk.done::after{content:'✓';color:#fff;font-size:12px;font-weight:700}
.hw-info{flex:1;min-width:0}
.hw-t{font-size:13.5px;font-weight:600;color:var(--text-1)}
.hw-t.dt{text-decoration:line-through;color:var(--text-3)}
.hw-meta{font-size:11px;color:var(--text-2);margin-top:3px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.section-lbl{padding:14px 14px 6px;font-size:10.5px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:0.7px}
.hw-inp{flex:1;border:1.5px solid var(--btn);border-radius:10px;padding:9px 12px;font-size:13px;color:var(--text-1);font-family:inherit;outline:none;background:var(--card-bg)}
.hw-inp:focus{border-color:var(--accent)}
.sel{border:1.5px solid var(--btn);border-radius:10px;padding:8px 8px;font-size:12px;color:var(--text-1);background:var(--card-bg);font-family:inherit;outline:none}
/* Buttons */
.btn-dark{border:none;background:var(--btn);color:#fff;border-radius:10px;cursor:pointer;font-family:inherit;font-weight:700;display:flex;align-items:center;gap:5px;transition:opacity 0.15s}
.btn-dark:active{opacity:0.8}
.del-btn{border:none;background:var(--btn);color:#fff;font-size:13px;font-weight:700;width:30px;height:30px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.back-btn{border:none;background:var(--btn);color:#fff;font-size:13px;font-family:inherit;display:flex;align-items:center;gap:5px;font-weight:700;padding:7px 14px;border-radius:10px;cursor:pointer}
.save-btn{border:none;background:var(--btn);color:#fff;font-size:13px;font-weight:700;font-family:inherit;padding:7px 18px;border-radius:10px;cursor:pointer}
.plus-btn{border:none;background:var(--btn);color:#fff;border-radius:50%;width:52px;height:52px;cursor:pointer;font-size:30px;font-weight:300;display:flex;align-items:center;justify-content:center}
.add-btn{border:none;background:var(--btn);color:#fff;border-radius:10px;padding:9px 18px;cursor:pointer;font-size:18px;font-weight:700;font-family:inherit}
/* Modal */
.modal-ov{position:fixed;inset:0;background:rgba(30,58,95,0.3);display:flex;align-items:center;justify-content:center;z-index:99}
.modal{background:var(--card-bg);border-radius:18px;border:1px solid var(--border);padding:20px;width:300px}
.modal-title{font-size:16px;font-weight:700;color:var(--text-1);margin-bottom:14px}
.modal-inp{width:100%;border:1.5px solid var(--btn);border-radius:10px;padding:10px 12px;font-size:14px;color:var(--text-1);font-family:inherit;outline:none;background:var(--app-bg);margin-bottom:12px}
.modal-inp:focus{border-color:var(--accent)}
.emorow{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.eopt{width:36px;height:36px;border-radius:9px;border:1.5px solid var(--border);background:var(--app-bg);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
.eopt.sel2{border-color:var(--btn);background:#E8F0FB}
.modal-btns{display:flex;gap:8px}
.mbtn{flex:1;border:none;border-radius:10px;padding:10px;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit}
.mbtn-c{background:#E8F0FB;color:var(--btn)}
.mbtn-ok{background:var(--btn);color:#fff}
/* Verbinden-Banner */
.conn-banner{background:#FFF7ED;border:1px solid #FED7AA;border-radius:12px;margin:10px 14px;padding:14px 16px}
.conn-title{font-size:13px;font-weight:700;color:#92400E;margin-bottom:6px}
.conn-text{font-size:12px;color:#78350F;line-height:1.6}
.conn-steps{font-size:12px;color:#92400E;margin-top:8px;padding-left:14px;line-height:1.8}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div><div class="header-title" id="hd-title">Posteingang</div><div class="header-sub" id="hd-sub">Gmail</div></div>
    <div class="avatar">Du</div>
  </div>
  <div class="content" id="content"></div>
  <div class="nav">
    <button class="nav-btn active" id="nb-mail" onclick="sw('mail')">
      <div class="nic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,4 12,13 22,4"/></svg></div>Mail
    </button>
    <button class="nav-btn" id="nb-cal" onclick="sw('cal')">
      <div class="nic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>Kalender
    </button>
    <button class="nav-btn" id="nb-notes" onclick="sw('notes')">
      <div class="nic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></div>Notizen
    </button>
    <button class="nav-btn" id="nb-learn" onclick="sw('learn')">
      <div class="nic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></div>Lernen
    </button>
    <button class="nav-btn" id="nb-hw" onclick="sw('hw')">
      <div class="nic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></div>Aufgaben
    </button>
  </div>
</div>

<script>
// ── State ──
let tab='mail', calOff=0;
let notes=[], hw=[], folders=[];
let lView='folders', lFi=null, lNi=null;
let nEdit=null, nEditMode=false;
window._emo='📐';
const EMOJIS=['📐','📖','💻','🏛️','🌍','🔬','🎨','🎵','⚽','🧪','📊','📝','🧬','🎯','🏆','📌'];

// ── Storage (localStorage für echte App) ──
function loadData(){
  try{notes=JSON.parse(localStorage.getItem('dn_notes')||'[]');}catch(e){notes=[];}
  try{hw=JSON.parse(localStorage.getItem('dn_hw')||'[]');}catch(e){hw=[];}
  try{folders=JSON.parse(localStorage.getItem('dn_folders')||'[]');}catch(e){folders=[];}
}
function saveNotes(){localStorage.setItem('dn_notes',JSON.stringify(notes));}
function saveHW(){localStorage.setItem('dn_hw',JSON.stringify(hw));}
function saveFolders(){localStorage.setItem('dn_folders',JSON.stringify(folders));}

// ── Header ──
function setH(t,s){document.getElementById('hd-title').textContent=t;document.getElementById('hd-sub').textContent=s;}

// ── Tab switch ──
function sw(t){
  tab=t;lView='folders';lFi=null;lNi=null;nEdit=null;nEditMode=false;
  ['mail','cal','notes','learn','hw'].forEach(x=>document.getElementById('nb-'+x).classList.toggle('active',x===t));
  const T={mail:'Posteingang',cal:'Kalender',notes:'Notizen',learn:'Lernen',hw:'Hausaufgaben'};
  const S={mail:'Gmail',cal:'Apple & Outlook',notes:'Eigene Notizen',learn:'Meine Ordner',hw:'Offene Aufgaben'};
  setH(T[t],S[t]);render();
}
function render(){
  const el=document.getElementById('content');
  if(tab==='mail')el.innerHTML=rMail();
  else if(tab==='cal')el.innerHTML=rCal();
  else if(tab==='notes')el.innerHTML=rNotes();
  else if(tab==='learn')el.innerHTML=rLearn();
  else el.innerHTML=rHW();
}

// ── Datum ──
function dayLabel(o){
  const d=new Date();d.setDate(d.getDate()+o);
  const D=['So','Mo','Di','Mi','Do','Fr','Sa'];
  const M=['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
  const lbl=o===0?'Heute':o===1?'Morgen':o===-1?'Gestern':D[d.getDay()]+'.';
  return lbl+', '+d.getDate()+'. '+M[d.getMonth()];
}

// ── MAIL ──
function rMail(){
  const stored=JSON.parse(localStorage.getItem('dn_mails')||'[]');
  const items=stored.length?stored.map((m,i)=>`
    <div class="mail-item">
      <div class="mail-dot ${m.read?'read':''}"></div>
      <div class="mail-body">
        <div class="mail-from">${m.from}<span class="mail-time">${m.time}</span></div>
        <div class="mail-subject">${m.subject}</div>
        <div class="mail-preview">${m.preview}</div>
      </div>
    </div>`).join(''):'';
  return`
    <div class="conn-banner">
      <div class="conn-title">📧 Gmail verbinden</div>
      <div class="conn-text">Um echte E-Mails zu sehen, verbinde deinen Gmail-Account:</div>
      <ol class="conn-steps">
        <li>Gehe auf <strong>console.cloud.google.com</strong></li>
        <li>Erstelle ein Projekt &amp; aktiviere Gmail API</li>
        <li>OAuth Client ID erstellen</li>
        <li>Client ID hier eintragen</li>
      </ol>
    </div>
    ${stored.length?'<div class="card">'+items+'</div>':'<div class="empty-state">Keine Mails vorhanden.<br>Verbinde dein Gmail-Konto.</div>'}`;
}

// ── KALENDER ──
function rCal(){
  const evs=JSON.parse(localStorage.getItem('dn_events_'+calOff)||'[]');
  const items=evs.length?evs.map((e,i)=>`
    <div class="cal-item">
      <div class="cal-tc"><div class="cal-start">${e.time}</div><div class="cal-end">${e.end||''}</div></div>
      <div class="cal-stripe" style="background:${e.cal==='Apple'?'#22C55E':'#3B82F6'}"></div>
      <div class="cal-info">
        <div class="cal-title">${e.title}</div>
        <div class="cal-meta">${e.location||''} <span class="badge badge-gray" style="padding:1px 6px;font-size:10px">${e.cal||''}</span></div>
      </div>
      <button class="del-btn" onclick="delEv(${i})">✕</button>
    </div>`).join(''):'<div class="empty-state">Keine Termine.<br>Tippe auf + um einen hinzuzufügen.</div>';
  return`
    <div class="conn-banner" style="background:#EFF6FF;border-color:#BFDBFE">
      <div class="conn-title" style="color:#1E3A5F">📅 Kalender verbinden</div>
      <div class="conn-text" style="color:#2D4F80">Outlook: Azure Portal → App Registration<br>Apple: iCloud CalDAV + App-Passwort</div>
    </div>
    <div class="date-nav">
      <button class="dnbtn" onclick="calOff--;render()">‹</button>
      <span class="date-label">${dayLabel(calOff)}</span>
      <button class="dnbtn" onclick="calOff++;render()">›</button>
    </div>
    <div class="card">${items}</div>
    <div style="padding:4px 14px 10px;display:flex;gap:8px;align-items:center">
      <button class="btn-dark" style="padding:8px 14px;font-size:13px" onclick="showAddEvent()">+ Termin</button>
    </div>`;
}
function delEv(i){
  const evs=JSON.parse(localStorage.getItem('dn_events_'+calOff)||'[]');
  evs.splice(i,1);localStorage.setItem('dn_events_'+calOff,JSON.stringify(evs));render();
}
function showAddEvent(){
  const m=document.createElement('div');m.className='modal-ov';m.id='ev-modal';
  m.innerHTML=`<div class="modal">
    <div class="modal-title">Neuer Termin</div>
    <input class="modal-inp" id="ev-title" placeholder="Titel" />
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <input class="modal-inp" id="ev-time" placeholder="Beginn z.B. 09:00" style="margin:0;flex:1" />
      <input class="modal-inp" id="ev-end" placeholder="Ende z.B. 10:00" style="margin:0;flex:1" />
    </div>
    <input class="modal-inp" id="ev-loc" placeholder="Ort (optional)" />
    <select class="sel" id="ev-cal" style="width:100%;margin-bottom:14px;padding:10px"><option>Outlook</option><option>Apple</option></select>
    <div class="modal-btns">
      <button class="mbtn mbtn-c" onclick="closeM()">Abbrechen</button>
      <button class="mbtn mbtn-ok" onclick="saveEvent()">Speichern</button>
    </div>
  </div>`;
  document.querySelector('.app').appendChild(m);
  setTimeout(()=>document.getElementById('ev-title')?.focus(),80);
}
function saveEvent(){
  const t=document.getElementById('ev-title')?.value?.trim();
  if(!t)return;
  const evs=JSON.parse(localStorage.getItem('dn_events_'+calOff)||'[]');
  evs.push({title:t,time:document.getElementById('ev-time')?.value||'',end:document.getElementById('ev-end')?.value||'',location:document.getElementById('ev-loc')?.value||'',cal:document.getElementById('ev-cal')?.value||'Outlook'});
  localStorage.setItem('dn_events_'+calOff,JSON.stringify(evs));closeM();render();
}

// ── NOTIZEN ──
function rNotes(){
  if(nEditMode)return rEditor(notes,nEdit,'notes');
  const items=notes.length?notes.map((n,i)=>`
    <div class="note-card" onclick="openNE('notes',${i})">
      <div style="flex:1;min-width:0">
        <div class="note-title">${esc(n.title||'Ohne Titel')}</div>
        <div class="note-body">${esc(n.body||'')}</div>
        <div class="note-date">${n.date}</div>
      </div>
      <button onclick="event.stopPropagation();delNote(${i})" class="del-btn">✕</button>
    </div>`).join(''):'<div class="empty-state" style="padding-top:60px">Noch keine Notizen.<br>Tippe auf + um loszulegen.</div>';
  return`<div class="status-bar"><span class="status-text">${notes.length} Notiz${notes.length!==1?'en':''} gespeichert</span></div>
    <div class="card">${items}</div>
    <div style="text-align:right;padding:12px 16px"><button class="plus-btn" onclick="newNote()">+</button></div>`;
}
function rEditor(arr,idx,ctx){
  const n=(idx==='new')?{title:'',body:''}:(arr[idx]||{title:'',body:''});
  return`<div class="editor-wrap">
    <div class="editor-topbar">
      <button class="back-btn" onclick="closeEd('${ctx}')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><polyline points="15 18 9 12 15 6" stroke="#fff" stroke-width="2.5"/></svg> Zurück
      </button>
      <button class="save-btn" onclick="saveEd('${ctx}')">Speichern</button>
    </div>
    <input id="ed-t" class="title-inp" placeholder="Titel" value="${esc(n.title||'')}" />
    <div style="height:1px;background:var(--border);margin:0 16px"></div>
    <textarea id="ed-b" class="body-inp" placeholder="Inhalt...">${esc(n.body||'')}</textarea>
  </div>`;
}
function newNote(){nEdit='new';nEditMode=true;setH('Neue Notiz','');render();setTimeout(()=>document.getElementById('ed-t')?.focus(),80);}
function openNE(ctx,i){
  if(ctx==='notes'){nEdit=i;nEditMode=true;setH('Notiz bearbeiten','');render();}
  else{lNi=i;lView='editor';setH(folders[lFi].name,'Notiz bearbeiten');render();}
}
function closeEd(ctx){
  if(ctx==='notes'){nEdit=null;nEditMode=false;setH('Notizen','Eigene Notizen');}
  else{lNi=null;lView='notes';setH(folders[lFi].name,folders[lFi].emoji+' Ordner');}
  render();
}
function saveEd(ctx){
  const t=document.getElementById('ed-t')?.value||'';
  const b=document.getElementById('ed-b')?.value||'';
  const d=new Date().toLocaleDateString('de-CH',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
  if(ctx==='notes'){
    if(nEdit==='new')notes.unshift({title:t,body:b,date:d});else notes[nEdit]={title:t,body:b,date:d};
    saveNotes();nEdit=null;nEditMode=false;setH('Notizen','Eigene Notizen');
  } else {
    const f=folders[lFi];
    if(lNi==='new')f.notes.unshift({title:t,body:b,date:d});else f.notes[lNi]={title:t,body:b,date:d};
    saveFolders();lNi=null;lView='notes';setH(f.name,f.emoji+' Ordner');
  }
  render();
}
function delNote(i){notes.splice(i,1);saveNotes();render();}

// ── LERNEN ──
function rLearn(){
  if(lView==='folders')return rFolders();
  if(lView==='notes')return rFolderNotes();
  if(lView==='editor')return rEditor(folders[lFi].notes,lNi,'learn');
  return rFolders();
}
function rFolders(){
  const items=folders.length?folders.map((f,i)=>`
    <div class="row-item" onclick="openFolder(${i})">
      <div class="row-icon">${f.emoji}</div>
      <div class="row-body">
        <div class="row-title">${esc(f.name)}</div>
        <div class="row-sub">${f.notes.length} Notiz${f.notes.length!==1?'en':''}</div>
      </div>
      <button onclick="event.stopPropagation();delFolder(${i})" class="del-btn">✕</button>
      <div class="row-arr">›</div>
    </div>`).join(''):'<div class="empty-state" style="padding-top:60px">Noch keine Ordner.<br>Tippe auf + um loszulegen.</div>';
  const total=folders.reduce((a,f)=>a+f.notes.length,0);
  return`<div class="status-bar"><span class="status-text">${folders.length} Ordner · ${total} Notizen</span></div>
    <div class="card">${items}</div>
    <div style="text-align:right;padding:12px 16px"><button class="plus-btn" onclick="showFolderModal()">+</button></div>`;
}
function openFolder(i){lFi=i;lView='notes';setH(folders[i].name,folders[i].emoji+' Ordner');render();}
function rFolderNotes(){
  const f=folders[lFi];
  const items=f.notes.length?f.notes.map((n,i)=>`
    <div class="note-card" onclick="openNE('learn',${i})">
      <div style="flex:1;min-width:0">
        <div class="note-title">${esc(n.title||'Ohne Titel')}</div>
        <div class="note-body">${esc(n.body||'')}</div>
        <div class="note-date">${n.date}</div>
      </div>
      <button onclick="event.stopPropagation();delLNote(${i})" class="del-btn">✕</button>
    </div>`).join(''):'<div class="empty-state" style="padding-top:60px">Noch keine Notizen.<br>Tippe auf + um loszulegen.</div>';
  return`<div style="padding:10px 16px 4px;display:flex;align-items:center;gap:8px">
      <button class="back-btn" onclick="backFolders()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><polyline points="15 18 9 12 15 6" stroke="#fff" stroke-width="2.5"/></svg> Ordner
      </button>
      <span style="font-size:12px;color:var(--text-3);margin-left:auto">${f.notes.length} Notiz${f.notes.length!==1?'en':''}</span>
    </div>
    <div class="card">${items}</div>
    <div style="text-align:right;padding:12px 16px"><button class="plus-btn" onclick="newLNote()">+</button></div>`;
}
function backFolders(){lView='folders';lFi=null;setH('Lernen','Meine Ordner');render();}
function newLNote(){lNi='new';lView='editor';render();setTimeout(()=>document.getElementById('ed-t')?.focus(),80);}
function delLNote(i){folders[lFi].notes.splice(i,1);saveFolders();render();}
function delFolder(i){if(confirm('Ordner "'+folders[i].name+'" löschen?')){folders.splice(i,1);saveFolders();render();}}
function showFolderModal(){
  window._emo='📐';
  const m=document.createElement('div');m.className='modal-ov';m.id='f-modal';
  const eo=EMOJIS.map((e,i)=>`<div class="eopt${i===0?' sel2':''}" onclick="selE(this,'${e}')">${e}</div>`).join('');
  m.innerHTML=`<div class="modal">
    <div class="modal-title">Neuer Ordner</div>
    <input class="modal-inp" id="fn-inp" placeholder="Ordnername z.B. Mathematik" />
    <div class="emorow">${eo}</div>
    <div class="modal-btns">
      <button class="mbtn mbtn-c" onclick="closeM()">Abbrechen</button>
      <button class="mbtn mbtn-ok" onclick="saveFolder()">Erstellen</button>
    </div>
  </div>`;
  document.querySelector('.app').appendChild(m);
  setTimeout(()=>document.getElementById('fn-inp')?.focus(),80);
}
function selE(el,e){document.querySelectorAll('.eopt').forEach(x=>x.classList.remove('sel2'));el.classList.add('sel2');window._emo=e;}
function saveFolder(){
  const n=document.getElementById('fn-inp')?.value?.trim();
  if(!n){document.getElementById('fn-inp')?.focus();return;}
  folders.unshift({name:n,emoji:window._emo||'📁',notes:[]});
  saveFolders();closeM();render();
}

// ── HAUSAUFGABEN ──
function rHW(){
  const open=hw.filter(h=>!h.done).length;
  const pc={hoch:'badge-red',mittel:'badge-amber',niedrig:'badge-green'};
  const items=hw.map((h,i)=>`
    <div class="hw-item">
      <div class="hw-chk ${h.done?'done':''}" onclick="toggleHW(${i})"></div>
      <div class="hw-info">
        <div class="hw-t ${h.done?'dt':''}">${esc(h.title)}</div>
        <div class="hw-meta">
          <span class="badge ${pc[h.prio]||'badge-gray'}">${h.prio}</span>
          <span style="font-size:10.5px;color:var(--text-3)">${h.due}</span>
          <span style="font-size:10.5px;color:var(--text-2)">${h.subject}</span>
        </div>
      </div>
      <button class="del-btn" onclick="delHW(${i})">✕</button>
    </div>`).join('');
  return`<div class="status-bar"><span class="status-text">${open} offen · ${hw.length-open} erledigt</span></div>
    <div class="card">${items||'<div class="empty-state">Alle Aufgaben erledigt! ✓</div>'}</div>
    <div class="section-lbl">Neue Aufgabe</div>
    <div style="padding:0 14px 8px;display:flex;gap:8px">
      <input class="hw-inp" id="hw-in" placeholder="Aufgabe eingeben..." onkeydown="if(event.key==='Enter')addHW()" />
      <button class="add-btn" onclick="addHW()">+</button>
    </div>
    <div style="padding:0 14px 12px;display:flex;gap:6px">
      <select id="hw-s" class="sel" style="flex:1">
        <option>Mathematik</option><option>Deutsch</option><option>Informatik</option>
        <option>Geschichte</option><option>Englisch</option><option>Physik</option>
        <option>Biologie</option><option>Chemie</option><option>Andere</option>
      </select>
      <select id="hw-d" class="sel" style="flex:1">
        <option>Heute</option><option>Morgen</option><option>Übermorgen</option>
        <option>Diese Woche</option><option>Nächste Woche</option>
      </select>
      <select id="hw-p" class="sel" style="width:76px">
        <option value="hoch">Hoch</option>
        <option value="mittel" selected>Mittel</option>
        <option value="niedrig">Niedrig</option>
      </select>
    </div>`;
}
function toggleHW(i){hw[i].done=!hw[i].done;saveHW();render();}
function delHW(i){hw.splice(i,1);saveHW();render();}
function addHW(){
  const t=document.getElementById('hw-in')?.value?.trim();
  if(!t)return;
  hw.unshift({id:Date.now(),title:t,subject:document.getElementById('hw-s')?.value||'Andere',due:document.getElementById('hw-d')?.value||'Morgen',done:false,prio:document.getElementById('hw-p')?.value||'mittel'});
  saveHW();render();
}

// ── Hilfsfunktionen ──
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function closeM(){document.getElementById('f-modal')?.remove();document.getElementById('ev-modal')?.remove();}

// ── Start ──
loadData();render();
</script>
</body>
</html>
