<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dashboard">
<meta name="theme-color" content="#0A1628">
<title>Mein Dashboard</title>
<link rel="apple-touch-icon" id="app-icon">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async></script>
<script src="https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js" async></script>
<script>
// Generate app icon via canvas
(function(){
  try{
    const c=document.createElement('canvas');c.width=180;c.height=180;
    const ctx=c.getContext('2d');
    // Rounded rect background
    const r=36;ctx.beginPath();ctx.moveTo(r,0);ctx.lineTo(180-r,0);ctx.quadraticCurveTo(180,0,180,r);ctx.lineTo(180,180-r);ctx.quadraticCurveTo(180,180,180-r,180);ctx.lineTo(r,180);ctx.quadraticCurveTo(0,180,0,180-r);ctx.lineTo(0,r);ctx.quadraticCurveTo(0,0,r,0);ctx.closePath();
    const g=ctx.createLinearGradient(0,0,180,180);
    g.addColorStop(0,'#0A1628');g.addColorStop(0.5,'#14274E');g.addColorStop(1,'#1A3A6E');
    ctx.fillStyle=g;ctx.fill();
    // Glow orb
    const orb=ctx.createRadialGradient(135,45,0,135,45,70);
    orb.addColorStop(0,'rgba(59,123,248,0.35)');orb.addColorStop(1,'rgba(59,123,248,0)');
    ctx.fillStyle=orb;ctx.fill();
    // Letter D
    ctx.font='bold 96px -apple-system,sans-serif';ctx.fillStyle='#fff';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.shadowColor='rgba(59,123,248,0.8)';ctx.shadowBlur=20;
    ctx.fillText('D',90,94);
    // Small dots
    [[42,148,4,'rgba(59,123,248,0.8)'],[138,148,3,'rgba(99,102,241,0.7)'],[90,148,2.5,'rgba(255,255,255,0.5)']].forEach(([x,y,r,col])=>{
      ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=col;ctx.shadowBlur=8;ctx.shadowColor=col;ctx.fill();
    });
    document.getElementById('app-icon').href=c.toDataURL('image/png');
  }catch(e){}
})();
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#0A1628;
  --navy2:#122040;
  --blue:#3B7BF8;
  --blue-soft:#EEF3FF;
  --blue-mid:#BFCFFD;
  --surface:#F4F6FB;
  --white:#FFFFFF;
  --t1:#0A1628;
  --t2:#4A5C7A;
  --t3:#94A3B8;
  --border:#E4EAF4;
  --border2:#CBD5E1;
  --green:#10B981;
  --red:#EF4444;
  --amber:#F59E0B;
  --shadow:0 2px 20px rgba(10,22,40,0.10);
  --shadow-sm:0 1px 8px rgba(10,22,40,0.07);
}
html,body{height:100%;overflow:hidden;background:var(--navy)}
body{font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,sans-serif}
.app{max-width:430px;margin:0 auto;height:100vh;display:flex;flex-direction:column;overflow:hidden;background:var(--surface);position:relative}

/* SPLASH SCREEN */
.splash{position:fixed;inset:0;z-index:999;background:linear-gradient(150deg,#0A1628 0%,#14274E 60%,#1A3A6E 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;transition:opacity 0.6s ease,transform 0.6s ease}
.splash.hide{opacity:0;transform:scale(1.04);pointer-events:none}
.splash-icon{width:90px;height:90px;border-radius:26px;background:linear-gradient(135deg,rgba(255,255,255,0.13),rgba(255,255,255,0.05));border:1px solid rgba(255,255,255,0.18);display:flex;align-items:center;justify-content:center;font-size:44px;font-weight:800;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;box-shadow:0 0 40px rgba(59,123,248,0.45),0 0 80px rgba(59,123,248,0.15);animation:splashPop 0.7s cubic-bezier(0.34,1.5,0.64,1) forwards}
.splash-ring{position:absolute;inset:-6px;border-radius:32px;background:conic-gradient(from 0deg,transparent 60%,rgba(99,102,241,0.7),rgba(59,123,248,0.9),transparent);animation:ringRotate 4s linear infinite;z-index:-1}
.splash-icon-wrap{position:relative;animation:splashPop 0.7s cubic-bezier(0.34,1.5,0.64,1) forwards}
.splash-title{font-size:24px;font-weight:800;color:#fff;letter-spacing:-0.3px;animation:splashFade 0.5s ease 0.25s both}
.splash-sub{font-size:13px;color:rgba(255,255,255,0.4);font-weight:500;animation:splashFade 0.5s ease 0.4s both}
.splash-loader{display:flex;gap:7px;margin-top:6px;animation:splashFade 0.5s ease 0.55s both}
.splash-loader span{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.25);animation:loaderDot 1.2s ease-in-out infinite}
.splash-loader span:nth-child(2){animation-delay:0.15s}
.splash-loader span:nth-child(3){animation-delay:0.3s}
.splash-orb1{position:absolute;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(59,123,248,0.2),transparent);top:60px;right:-60px;pointer-events:none}
.splash-orb2{position:absolute;width:150px;height:150px;border-radius:50%;background:radial-gradient(circle,rgba(99,102,241,0.18),transparent);bottom:80px;left:-40px;pointer-events:none}
@keyframes splashPop{from{opacity:0;transform:scale(0.6)}to{opacity:1;transform:scale(1)}}
@keyframes splashFade{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes loaderDot{0%,80%,100%{transform:scale(0.6);background:rgba(255,255,255,0.2)}40%{transform:scale(1.2);background:rgba(59,123,248,1)}}

/* HEADER */
.hdr{
  background:linear-gradient(150deg,#0A1628 0%,#14274E 60%,#1A3A6E 100%);
  padding:max(env(safe-area-inset-top),20px) 22px 0;
  flex-shrink:0;
  position:relative;
  overflow:hidden;
}
.hdr::before{
  content:'';position:absolute;top:-60px;right:-40px;
  width:200px;height:200px;border-radius:50%;
  background:rgba(59,123,248,0.12);pointer-events:none;
}
.hdr::after{
  content:'';position:absolute;top:20px;right:60px;
  width:80px;height:80px;border-radius:50%;
  background:rgba(59,123,248,0.08);pointer-events:none;
}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;position:relative;z-index:1}
.hdr-greeting{font-size:12px;color:rgba(255,255,255,0.5);font-weight:500;letter-spacing:0.3px}
.hdr-title{font-size:22px;font-weight:800;color:#fff;letter-spacing:-0.3px;margin-top:1px;position:relative;z-index:1}

/* DECORATIVE BAR */
.deco-bar{position:relative;height:17px;margin:6px 0 10px;z-index:1;overflow:hidden;display:flex;align-items:center}
.deco-line{position:absolute;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.08) 20%,rgba(99,102,241,0.4) 40%,rgba(59,123,248,0.6) 50%,rgba(99,102,241,0.4) 60%,rgba(255,255,255,0.08) 80%,transparent);animation:lineShimmer 3s ease-in-out infinite}
@keyframes lineShimmer{0%,100%{opacity:0.6;transform:scaleX(0.9)}50%{opacity:1;transform:scaleX(1)}}
.deco-orb{position:absolute;border-radius:50%;filter:blur(10px);pointer-events:none}
.deco-orb1{width:60px;height:60px;background:radial-gradient(circle,rgba(59,123,248,0.5),transparent);top:-20px;left:15%;animation:decoFloat1 5s ease-in-out infinite}
.deco-orb2{width:40px;height:40px;background:radial-gradient(circle,rgba(139,92,246,0.6),transparent);top:-10px;left:52%;animation:decoFloat2 7s ease-in-out infinite}
.deco-orb3{width:50px;height:50px;background:radial-gradient(circle,rgba(99,102,241,0.45),transparent);top:-15px;right:10%;animation:decoFloat1 6s ease-in-out infinite reverse}
@keyframes decoFloat1{0%,100%{transform:translateX(0) translateY(0)}33%{transform:translateX(10px) translateY(-4px)}66%{transform:translateX(-6px) translateY(3px)}}
@keyframes decoFloat2{0%,100%{transform:translateX(0) translateY(0)}50%{transform:translateX(-12px) translateY(-5px)}}
.deco-dots{position:absolute;left:0;right:0;display:flex;justify-content:center;align-items:center;gap:6px}
.deco-dots span{display:block;border-radius:50%;background:rgba(255,255,255,0.25)}
.deco-dots span:nth-child(1){width:3px;height:3px;animation:dotPulse 2.4s ease-in-out infinite 0s}
.deco-dots span:nth-child(2){width:4px;height:4px;animation:dotPulse 2.4s ease-in-out infinite 0.2s}
.deco-dots span:nth-child(3){width:6px;height:6px;background:rgba(59,123,248,0.8);animation:dotPulse 2.4s ease-in-out infinite 0.4s;box-shadow:0 0 8px rgba(59,123,248,0.6)}
.deco-dots span:nth-child(4){width:4px;height:4px;animation:dotPulse 2.4s ease-in-out infinite 0.6s}
.deco-dots span:nth-child(5){width:3px;height:3px;animation:dotPulse 2.4s ease-in-out infinite 0.8s}
@keyframes dotPulse{0%,100%{transform:scaleY(1);opacity:0.3}50%{transform:scaleY(2.2);opacity:1}}
.av-wrap{position:relative;cursor:pointer;flex-shrink:0}
.av{
  width:42px;height:42px;border-radius:50%;
  background:linear-gradient(135deg,#3B7BF8,#6366F1,#8B5CF6);
  background-size:200% 200%;
  animation:gradientShift 12s ease infinite;
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:800;letter-spacing:0.5px;
  position:relative;z-index:1;
}
/* spinning ring */
.av-ring{
  position:absolute;inset:-4px;border-radius:50%;
  background:conic-gradient(from 0deg,transparent 60%,rgba(99,102,241,0.8),rgba(59,123,248,0.9),transparent);
  animation:ringRotate 3s linear infinite;
  z-index:0;
}
.av-ring2{
  position:absolute;inset:-2px;border-radius:50%;
  background:var(--navy);
  z-index:0;
}
@keyframes ringRotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.av-ring{animation:ringRotate 8s linear infinite}

/* small online dot */
.av-dot{
  position:absolute;bottom:1px;right:1px;
  width:10px;height:10px;border-radius:50%;
  background:#22C55E;border:2px solid #0A1628;
  z-index:2;animation:greenPulse 2.5s ease-in-out infinite;
}

/* TAB PILLS removed */

/* CONTENT */
.cnt{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:96px}

/* BOTTOM NAV – Floating Transparent Glass */
.nav-wrap{
  position:absolute;bottom:0;left:0;right:0;
  padding:0 20px calc(max(env(safe-area-inset-bottom),16px));
  pointer-events:none;
  z-index:10;
}
.nav{
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(30px) saturate(200%);
  -webkit-backdrop-filter:blur(30px) saturate(200%);
  border-radius:100px;display:flex;padding:6px;gap:3px;
  pointer-events:all;
  border:1px solid rgba(255,255,255,0.8);
  box-shadow:0 8px 32px rgba(10,22,40,0.15),0 2px 8px rgba(10,22,40,0.08);
}
.nb{
  flex:1;border:none;background:transparent;
  padding:10px 8px;border-radius:100px;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  color:rgba(10,22,40,0.4);font-size:10px;font-family:inherit;font-weight:700;
  cursor:pointer;transition:all 0.35s cubic-bezier(0.34,1.3,0.64,1);
  white-space:nowrap;overflow:hidden;
}
.nb.on{
  background:linear-gradient(145deg,#0A1628 0%,#1A3060 100%);
  color:#fff;flex:1.9;flex-direction:row;gap:8px;
  padding:10px 18px;font-size:12px;
  box-shadow:0 4px 16px rgba(10,22,40,0.32);
}
.nb svg{width:20px;height:20px;stroke-width:2;display:block;flex-shrink:0}
.nb-lbl{display:none}
.nb.on .nb-lbl{display:block}

/* CARDS */
.card{background:var(--white);border-radius:20px;border:1px solid var(--border);margin:12px 16px;overflow:hidden;box-shadow:var(--shadow-sm)}

/* STATUS BAR */
.sbar{display:flex;align-items:center;gap:8px;background:var(--blue-soft);border-bottom:1px solid var(--border);padding:8px 16px}
.st{font-size:11.5px;color:var(--t2);font-weight:500}
.don{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;flex-shrink:0;box-shadow:0 0 6px rgba(16,185,129,0.4)}
.doff{width:7px;height:7px;border-radius:50%;background:var(--red);display:inline-block;flex-shrink:0}

/* SECTION HEADER */
.sec-hdr{padding:16px 16px 8px;display:flex;align-items:center;justify-content:space-between}
.sec-title{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1px}

/* BADGES */
.badge{font-size:10px;padding:3px 8px;border-radius:100px;font-weight:700}
.b-blue{background:#EEF3FF;color:#3050C8}
.b-r{background:#FFF1F1;color:#C42B2B}
.b-a{background:#FFFBEB;color:#B45309}
.b-g{background:#F0FDF6;color:#0D7A4E}
.b-gr{background:var(--surface);color:var(--t2)}

/* MAIL */
.mi{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;gap:13px;align-items:flex-start;cursor:pointer;transition:background 0.15s}
.mi:last-child{border-bottom:none}
.mi:active{background:var(--blue-soft)}
.mi-av{width:40px;height:40px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0;color:#fff;letter-spacing:-0.5px}
.mi-body{flex:1;min-width:0}
.mi-top{display:flex;justify-content:space-between;align-items:center;gap:6px}
.mi-from{font-size:13.5px;font-weight:700;color:var(--t1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mi-time{font-size:11px;color:var(--t3);font-weight:500;flex-shrink:0}
.mi-subj{font-size:13px;font-weight:600;color:var(--t1);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mi-prev{font-size:12px;color:var(--t2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:400}
.unread-bar{width:3px;border-radius:2px;align-self:stretch;background:var(--blue);flex-shrink:0}

/* CALENDAR */
.dnav{display:flex;align-items:center;justify-content:space-between;padding:12px 16px}
.dnbtn{border:none;background:var(--navy);color:#fff;font-size:18px;padding:6px 14px;border-radius:12px;cursor:pointer;font-weight:700;line-height:1.3;font-family:inherit}
.dlbl{font-size:15px;font-weight:700;color:var(--t1)}
.ci{padding:12px 16px;display:flex;gap:14px;align-items:stretch;border-bottom:1px solid var(--border)}
.ci:last-child{border-bottom:none}
.ci-time{min-width:46px;text-align:right;display:flex;flex-direction:column;justify-content:center}
.ci-h{font-size:13px;font-weight:700;color:var(--t1)}
.ci-e{font-size:11px;color:var(--t3);font-weight:500}
.ci-stripe{width:4px;border-radius:4px;flex-shrink:0}
.ci-body{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center}
.ci-title{font-size:13.5px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-meta{font-size:11.5px;color:var(--t2);margin-top:3px;display:flex;gap:6px;align-items:center}

/* NOTES */
.nc{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:flex-start;cursor:pointer;transition:background 0.15s}
.nc:last-child{border-bottom:none}
.nc:active{background:var(--blue-soft)}
.nc-icon{width:36px;height:36px;border-radius:12px;background:var(--blue-soft);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px}
.nc-body{flex:1;min-width:0}
.nc-title{font-size:13.5px;font-weight:700;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nc-preview{font-size:12px;color:var(--t2);margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.5}
.nc-date{font-size:10.5px;color:var(--t3);margin-top:4px;font-weight:500}

/* EDITOR */
.ew{background:var(--white);min-height:100%;display:flex;flex-direction:column}
.etb{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--white)}
.note-ti{border:none;background:transparent;font-size:20px;font-weight:800;color:var(--t1);font-family:inherit;outline:none;padding:16px 20px 8px;width:100%;letter-spacing:-0.3px}
.note-bi{border:none;background:transparent;font-size:15px;color:var(--t1);font-family:inherit;outline:none;padding:4px 20px;width:100%;resize:none;min-height:300px;line-height:1.8;font-weight:400}

/* HOMEWORK */
.hwi{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;gap:13px;align-items:flex-start;transition:background 0.15s}
.hwi:last-child{border-bottom:none}
.hwi:active{background:var(--blue-soft)}
.hwc{width:24px;height:24px;border-radius:50%;border:2.5px solid var(--blue-mid);cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;background:transparent}
.hwc.done{background:var(--navy);border-color:var(--navy)}
.hwc.done::after{content:'✓';color:#fff;font-size:12px;font-weight:800}
.hwi-body{flex:1;min-width:0}
.hwt{font-size:13.5px;font-weight:600;color:var(--t1);line-height:1.4}
.hwt.dt{text-decoration:line-through;color:var(--t3)}
.hwm{font-size:11.5px;color:var(--t2);margin-top:4px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.add-row{padding:10px 16px;display:flex;gap:8px}
.hw-in{flex:1;border:1.5px solid var(--border2);border-radius:14px;padding:11px 14px;font-size:13px;color:var(--t1);font-family:inherit;outline:none;background:var(--white);font-weight:500}
.hw-in:focus{border-color:var(--blue)}
.sel-row{padding:0 16px 14px;display:flex;gap:6px}
.sel{border:1.5px solid var(--border2);border-radius:12px;padding:9px 10px;font-size:12px;color:var(--t1);background:var(--white);font-family:inherit;outline:none;font-weight:500}
.sl{padding:16px 16px 8px;font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1px}

/* BUTTONS */
.btn{border:none;background:var(--navy);color:#fff;border-radius:14px;cursor:pointer;font-family:inherit;font-weight:700;padding:11px 20px;font-size:13px;letter-spacing:0.1px;transition:opacity 0.15s}
.btn:active{opacity:0.8}
.btn-blue{background:linear-gradient(135deg,#3B7BF8,#1D4ED8)}
.btn-sm{padding:6px 14px;font-size:12px;border-radius:10px}
.del{border:none;background:var(--surface);color:var(--t2);font-size:13px;font-weight:700;width:30px;height:30px;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid var(--border)}
.bk{border:none;background:var(--navy);color:#fff;font-size:13px;font-family:inherit;display:flex;align-items:center;gap:6px;font-weight:700;padding:8px 16px;border-radius:12px;cursor:pointer}
.sv{border:none;background:linear-gradient(135deg,#3B7BF8,#1D4ED8);color:#fff;font-size:13px;font-weight:700;font-family:inherit;padding:8px 20px;border-radius:12px;cursor:pointer}
.plus{border:none;background:var(--navy);color:#fff;border-radius:50%;width:54px;height:54px;cursor:pointer;font-size:28px;font-weight:300;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(10,22,40,0.25);transition:transform 0.15s}
.plus:active{transform:scale(0.94)}
.add-btn{border:none;background:linear-gradient(135deg,#3B7BF8,#1D4ED8);color:#fff;border-radius:14px;padding:11px 18px;cursor:pointer;font-size:18px;font-weight:700;font-family:inherit}

/* SETUP BOX */
.setup{background:var(--white);border-radius:20px;border:1px solid var(--border);margin:12px 16px;padding:20px;box-shadow:var(--shadow-sm)}
.setup-icon{font-size:32px;margin-bottom:12px}
.setup h3{font-size:16px;font-weight:800;color:var(--t1);margin-bottom:8px;letter-spacing:-0.2px}
.setup p{font-size:13px;color:var(--t2);line-height:1.6;margin-bottom:12px}
.setup ol{font-size:12.5px;color:var(--t2);padding-left:16px;line-height:2}
.setup ol code{background:var(--blue-soft);color:#2040B0;padding:1px 6px;border-radius:5px;font-family:monospace;font-size:11px}
.setup-inp{width:100%;border:1.5px solid var(--border2);border-radius:14px;padding:11px 14px;font-size:13px;color:var(--t1);font-family:inherit;outline:none;background:var(--surface);margin-top:12px;margin-bottom:10px;font-weight:500}
.setup-inp:focus{border-color:var(--blue)}

/* EMPTY STATE */
.empty{text-align:center;padding:44px 24px;color:var(--t3);font-size:13.5px;line-height:1.8;font-weight:500}
.empty-icon{font-size:36px;display:block;margin-bottom:10px}

/* MODAL */
.mov{position:fixed;inset:0;background:rgba(10,22,40,0.45);display:flex;align-items:flex-end;justify-content:center;z-index:99;backdrop-filter:blur(2px)}
.modal{background:var(--white);border-radius:24px 24px 0 0;padding:24px 20px max(env(safe-area-inset-bottom),24px);width:100%;max-width:430px}
.modal-handle{width:36px;height:4px;border-radius:2px;background:var(--border2);margin:0 auto 20px}
.modal h3{font-size:18px;font-weight:800;color:var(--t1);margin-bottom:16px;letter-spacing:-0.2px}
.m-in{width:100%;border:1.5px solid var(--border2);border-radius:14px;padding:11px 14px;font-size:14px;color:var(--t1);font-family:inherit;outline:none;background:var(--surface);margin-bottom:10px;font-weight:500}
.m-in:focus{border-color:var(--blue)}
.m-row{display:flex;gap:8px;margin-bottom:10px}
.m-row .m-in{margin-bottom:0}
.mbtns{display:flex;gap:8px;margin-top:6px}
.mbtn{flex:1;border:none;border-radius:14px;padding:13px;cursor:pointer;font-size:14px;font-weight:700;font-family:inherit}
.mc{background:var(--surface);color:var(--t1)}
.mok{background:var(--navy);color:#fff}

.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes spin{to{transform:rotate(360deg)}}

/* avatar colors */
.av-c0{background:linear-gradient(135deg,#6366F1,#8B5CF6)}
.av-c1{background:linear-gradient(135deg,#3B7BF8,#06B6D4)}
.av-c2{background:linear-gradient(135deg,#F59E0B,#EF4444)}
.av-c3{background:linear-gradient(135deg,#10B981,#3B7BF8)}
.av-c4{background:linear-gradient(135deg,#EC4899,#8B5CF6)}
.av-c5{background:linear-gradient(135deg,#F97316,#FBBF24)}

.fach-chip.fach-on{background:var(--navy)!important;color:#fff!important;border-color:var(--navy)!important}

/* ── COOL EFFECTS ── */

/* Tab switch slide animation */
@keyframes slideInRight{from{opacity:0;transform:translateX(22px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-22px)}to{opacity:1;transform:translateX(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeUp 0.22s cubic-bezier(0.34,1.2,0.64,1) forwards}
.slide-right{animation:slideInRight 0.25s cubic-bezier(0.34,1.2,0.64,1) forwards}
.slide-left{animation:slideInLeft 0.25s cubic-bezier(0.34,1.2,0.64,1) forwards}

/* Animated header gradient */
@keyframes gradientShift{
  0%{background-position:40% 50%}
  50%{background-position:60% 50%}
  100%{background-position:40% 50%}
}
.hdr{
  background:linear-gradient(135deg,#0A1628,#14274E,#0D2144,#1A3A6E,#0A1628)!important;
  background-size:300% 300%!important;
  animation:gradientShift 8s ease infinite!important;
}

/* Floating orbs in header */
.hdr::before{
  content:'';position:absolute;top:-40px;right:-30px;
  width:160px;height:160px;border-radius:50%;
  background:radial-gradient(circle,rgba(59,123,248,0.25) 0%,transparent 70%);
  pointer-events:none;
  animation:orbFloat 6s ease-in-out infinite;
}
.hdr::after{
  content:'';position:absolute;bottom:-20px;left:20px;
  width:100px;height:100px;border-radius:50%;
  background:radial-gradient(circle,rgba(99,102,241,0.2) 0%,transparent 70%);
  pointer-events:none;
  animation:orbFloat 8s ease-in-out infinite reverse;
}
@keyframes orbFloat{
  0%,100%{transform:translateY(0) scale(1)}
  50%{transform:translateY(-6px) scale(1.05)}
}

/* Card hover shimmer */
.card{position:relative;overflow:hidden}
.card::after{
  content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.06),transparent);
  animation:shimmer 4s ease-in-out infinite;pointer-events:none;
}
@keyframes shimmer{0%{left:-100%}50%,100%{left:150%}}

/* Ripple on tap */
.ripple{position:relative;overflow:hidden}
.ripple-wave{
  position:absolute;border-radius:50%;
  background:rgba(59,123,248,0.18);
  transform:scale(0);animation:rippleAnim 0.5s linear;
  pointer-events:none;
}
@keyframes rippleAnim{to{transform:scale(4);opacity:0}}

/* Pulse on unread mail dot */
.mail-unread-pulse{
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(59,123,248,0.4)}50%{box-shadow:0 0 0 6px rgba(59,123,248,0)}}

/* Active tab pill glow */
.nb.on{
  box-shadow:0 4px 20px rgba(10,22,40,0.35),0 0 0 1px rgba(255,255,255,0.08)!important;
}

/* Status dot pulse */
.don{animation:greenPulse 2.5s ease-in-out infinite}
@keyframes greenPulse{0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,0.5)}60%{box-shadow:0 0 0 5px rgba(16,185,129,0)}}

/* HW check bounce */
.hwc{transition:all 0.3s cubic-bezier(0.34,1.6,0.64,1)!important}
.hwc.done{transform:scale(1.05)}

/* Card press effect */
.mi:active,.nc:active,.hwi:active,.ci:active{
  transform:scale(0.985);
  transition:transform 0.1s ease;
}

/* Avatar glow kept in av CSS above */

/* Modal slide up */
.modal{animation:modalUp 0.3s cubic-bezier(0.34,1.3,0.64,1) forwards}
@keyframes modalUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}

/* Plus button glow pulse */
.plus{
  box-shadow:0 4px 16px rgba(10,22,40,0.25),0 0 0 0 rgba(10,22,40,0.2);
  animation:plusGlow 3s ease-in-out infinite;
}
@keyframes plusGlow{
  0%,100%{box-shadow:0 4px 16px rgba(10,22,40,0.25),0 0 0 0 rgba(10,22,40,0)}
  50%{box-shadow:0 6px 24px rgba(10,22,40,0.35),0 0 0 8px rgba(10,22,40,0)}
}

/* Scroll reveal for list items */
@keyframes itemIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.mi,.nc,.hwi,.ci{animation:itemIn 0.3s ease both}
.mi:nth-child(1),.nc:nth-child(1),.hwi:nth-child(1),.ci:nth-child(1){animation-delay:0.03s}
.mi:nth-child(2),.nc:nth-child(2),.hwi:nth-child(2),.ci:nth-child(2){animation-delay:0.07s}
.mi:nth-child(3),.nc:nth-child(3),.hwi:nth-child(3),.ci:nth-child(3){animation-delay:0.11s}
.mi:nth-child(4),.nc:nth-child(4),.hwi:nth-child(4),.ci:nth-child(4){animation-delay:0.15s}
.mi:nth-child(5),.nc:nth-child(5),.hwi:nth-child(5),.ci:nth-child(5){animation-delay:0.19s}

@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<!-- SPLASH SCREEN -->
<div class="splash" id="splash">
  <div class="splash-orb1"></div>
  <div class="splash-orb2"></div>
  <div class="splash-icon-wrap">
    <div class="splash-ring"></div>
    <div class="splash-icon">D</div>
  </div>
  <div class="splash-title">Mein Dashboard</div>
  <div class="splash-sub">Wird geladen...</div>
  <div class="splash-loader"><span></span><span></span><span></span></div>
</div>

<div class="app">
  <!-- HEADER -->
  <div class="hdr">
    <div class="hdr-top">
      <div>
        <div class="hdr-greeting" id="hd-greeting">Willkommen</div>
        <div class="hdr-title" id="hd-title">Posteingang</div>
      </div>
      <div class="av-wrap" id="av-btn">
        <div class="av-ring"></div>
        <div class="av-ring2"></div>
        <div class="av">JO</div>
        <div class="av-dot"></div>
      </div>
    </div>
    <!-- Decorative bar -->
    <div class="deco-bar">
      <div class="deco-orb deco-orb1"></div>
      <div class="deco-orb deco-orb2"></div>
      <div class="deco-orb deco-orb3"></div>
      <div class="deco-line"></div>
      <div class="deco-dots">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="cnt" id="cnt"></div>

  <!-- BOTTOM NAV -->
  <div class="nav-wrap" style="background:var(--surface)">
    <div class="nav">
      <button class="nb on" id="nb-mail" onclick="sw('mail')">
        <span style="font-size:20px;line-height:1">📧</span>
        <span class="nb-lbl">Mail</span>
      </button>
      <button class="nb" id="nb-cal" onclick="sw('cal')">
        <span style="font-size:20px;line-height:1">📅</span>
        <span class="nb-lbl">Kalender</span>
      </button>
      <button class="nb" id="nb-notes" onclick="sw('notes')">
        <span style="font-size:20px;line-height:1">📓</span>
        <span class="nb-lbl">Notizen</span>
      </button>
      <button class="nb" id="nb-hw" onclick="sw('hw')">
        <span style="font-size:20px;line-height:1">✅</span>
        <span class="nb-lbl">Aufgaben</span>
      </button>
    </div>
  </div>
</div>

<script>
// ── State ──
let tab='mail', calOff=0, hw=[];
let gmailToken=null, gmailEmails=[], gmailLoading=false;
let outlookToken=null, outlookEvents=[], outlookLoading=false, msalInst=null;
let appleEvents=[];
// Notizen – Ordner-System
let noteFolders=[], noteView='folders', noteFolderIdx=null, noteEdIdx=null;

// ── Greeting ──
function greeting(){
  const h=new Date().getHours();
  const name=localStorage.getItem('profile_name')||'';
  let greet;
  if(h>=5&&h<10) greet='Guten Morgen';
  else if(h>=10&&h<12) greet='Guten Vormittag';
  else if(h>=12&&h<14) greet='Guten Mittag';
  else if(h>=14&&h<18) greet='Guten Nachmittag';
  else if(h>=18&&h<22) greet='Guten Abend';
  else greet='Gute Nacht';
  return name ? `${greet}, ${name} 👋` : `${greet} 👋`;
}

function updateGreeting(){
  document.getElementById('hd-greeting').textContent=greeting();
}

// ── Storage ──
function load(){
  try{noteFolders=JSON.parse(localStorage.getItem('dn_folders')||'[]');}catch(e){noteFolders=[];}
  try{hw=JSON.parse(localStorage.getItem('dn_hw')||'[]');}catch(e){hw=[];}
  try{gmailEmails=JSON.parse(localStorage.getItem('dn_gmail_emails')||'[]');}catch(e){gmailEmails=[];}
  try{appleEvents=JSON.parse(localStorage.getItem('dn_apple_ev')||'[]');}catch(e){appleEvents=[];}
  try{outlookEvents=JSON.parse(localStorage.getItem('dn_outlook_ev')||'[]');}catch(e){outlookEvents=[];}
  if(localStorage.getItem('gmail_token_exp')&&Date.now()<+localStorage.getItem('gmail_token_exp'))
    gmailToken=localStorage.getItem('gmail_token');
  if(localStorage.getItem('outlook_token_exp')&&Date.now()<+localStorage.getItem('outlook_token_exp'))
    outlookToken=localStorage.getItem('outlook_token');
}
function saveFolders(){localStorage.setItem('dn_folders',JSON.stringify(noteFolders));}
function saveHW(){localStorage.setItem('dn_hw',JSON.stringify(hw));}

function setH(t){
  document.getElementById('hd-greeting').textContent=greeting();
  document.getElementById('hd-title').textContent=t;
}

let lastTabIdx=0;
function sw(t){
  const TABS_ORDER=['mail','cal','notes','hw'];
  const newIdx=TABS_ORDER.indexOf(t);
  const dir=newIdx>lastTabIdx?'slide-right':'slide-left';
  lastTabIdx=newIdx;
  tab=t;noteView='folders';noteFolderIdx=null;noteEdIdx=null;
  ['mail','cal','notes','hw'].forEach(x=>{
    document.getElementById('nb-'+x).classList.toggle('on',x===t);
  });
  const T={mail:'Posteingang',cal:'Kalender',notes:'Notizen',hw:'Hausaufgaben'};
  setH(T[t]);
  window._slideDir=dir;
  render();
}

// Ripple on any tappable element
document.addEventListener('touchstart',e=>{
  const el=e.target.closest('.mi,.nc,.hwi,.ci,.nb,.btn,.plus,.add-btn,.btn-blue,.bk,.sv,.mbtn,.fach-chip');
  if(!el)return;
  const r=document.createElement('span');
  r.className='ripple-wave';
  const rect=el.getBoundingClientRect();
  const size=Math.max(rect.width,rect.height)*2;
  r.style.cssText=`width:${size}px;height:${size}px;left:${e.touches[0].clientX-rect.left-size/2}px;top:${e.touches[0].clientY-rect.top-size/2}px`;
  el.style.position='relative';el.style.overflow='hidden';
  el.appendChild(r);
  setTimeout(()=>r.remove(),600);
},{passive:true});

function render(){
  const el=document.getElementById('cnt');
  el.innerHTML='';
  const inner=tab==='mail'?rMail():tab==='cal'?rCal():tab==='notes'?rNotes():rHW();
  const cls=window._slideDir||'fade-in';
  window._slideDir=null;
  el.innerHTML=`<div class="${cls}">${inner}</div>`;
}

// ── Avatar color ──
function avColor(name){
  let h=0;for(const c of name)h=(h*31+c.charCodeAt(0))%6;
  return'av-c'+h;
}
function initials(name){
  const p=name.trim().split(/\s+/);
  return p.length>=2?(p[0][0]+p[p.length-1][0]).toUpperCase():name.slice(0,2).toUpperCase();
}

// ── GMAIL ──
function rMail(){
  const cid=localStorage.getItem('gmail_client_id')||'';
  if(!cid) return `
    <div class="setup">
      <div class="setup-icon">📧</div>
      <h3>Gmail verbinden</h3>
      <p>Gib deine Google OAuth Client ID ein, um deine echten E-Mails zu sehen.</p>
      <ol>
        <li>Gehe auf <code>console.cloud.google.com</code></li>
        <li>Neues Projekt erstellen</li>
        <li>Gmail API aktivieren</li>
        <li>Anmeldedaten → OAuth 2.0 Client-ID</li>
        <li>Typ: <code>Webanwendung</code></li>
        <li>JS-Quelle: <code>${location.origin}</code></li>
      </ol>
      <input class="setup-inp" id="g-cid" placeholder="xxxxx.apps.googleusercontent.com" />
      <button class="btn btn-blue" onclick="saveGmailCID()" style="width:100%">Speichern &amp; verbinden</button>
    </div>`;

  const connected=!!gmailToken;
  let html=`<div class="sbar">
    <span class="${connected?'don':'doff'}"></span>
    <span class="st">${connected?'Gmail verbunden':'Nicht verbunden'}</span>
    ${connected
      ?`<button class="btn btn-sm" style="margin-left:auto;background:var(--surface);color:var(--t2);border:1px solid var(--border)" onclick="fetchGmailEmails()">🔄</button>
         <button class="btn btn-sm" style="background:var(--surface);color:var(--red);border:1px solid var(--border)" onclick="disconnectGmail()">Trennen</button>`
      :`<button class="btn btn-blue btn-sm" style="margin-left:auto" onclick="connectGmail()">${gmailLoading?'<span class="spinner"></span>':''}Verbinden</button>`
    }
  </div>`;

  if(!connected&&!gmailLoading){
    html+=`<div class="empty"><span class="empty-icon">📬</span>Verbinde Gmail, um deine E-Mails zu sehen.<br><small style="font-size:11px;color:var(--t3)"><span onclick="changeGmailSettings()" style="cursor:pointer;text-decoration:underline">Client ID ändern</span></small></div>`;
  } else if(gmailLoading){
    html+=`<div class="empty"><span class="empty-icon">⏳</span>E-Mails werden geladen...</div>`;
  } else if(gmailEmails.length===0){
    html+=`<div class="empty"><span class="empty-icon">📭</span>Keine E-Mails.<br><button class="btn btn-sm" style="margin-top:10px" onclick="fetchGmailEmails()">Laden</button></div>`;
  } else {
    const unread=gmailEmails.filter(m=>!m.read).length;
    html+=`<div style="padding:10px 16px 4px;display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:12px;color:var(--t3);font-weight:600">${unread>0?unread+' ungelesen':'Alle gelesen'}</span>
      <span onclick="changeGmailSettings()" style="font-size:11px;color:var(--t3);cursor:pointer;text-decoration:underline">Einstellungen</span>
    </div>`;
    html+=`<div class="card">`;
    html+=gmailEmails.map(m=>{
      const av=initials(m.from);const col=avColor(m.from);
      return`<div class="mi">
        ${!m.read?'<div class="unread-bar"></div>':'<div style="width:3px;flex-shrink:0"></div>'}
        <div class="mi-av ${col}">${av}</div>
        <div class="mi-body">
          <div class="mi-top"><span class="mi-from">${esc(m.from)}</span><span class="mi-time">${esc(m.time)}</span></div>
          <div class="mi-subj">${esc(m.subject)}</div>
          <div class="mi-prev">${esc(m.preview)}</div>
        </div>
      </div>`;
    }).join('');
    html+=`</div>`;
  }
  return html;
}

function saveGmailCID(){const v=document.getElementById('g-cid')?.value?.trim();if(!v)return;localStorage.setItem('gmail_client_id',v);connectGmail();}
function changeGmailSettings(){localStorage.removeItem('gmail_client_id');localStorage.removeItem('gmail_token');localStorage.removeItem('gmail_token_exp');gmailToken=null;gmailEmails=[];render();}
function disconnectGmail(){localStorage.removeItem('gmail_token');localStorage.removeItem('gmail_token_exp');localStorage.removeItem('dn_gmail_emails');gmailToken=null;gmailEmails=[];render();}
function connectGmail(){
  const cid=localStorage.getItem('gmail_client_id');if(!cid)return;
  if(typeof google==='undefined'){alert('Google-Script lädt noch. Bitte kurz warten.');return;}
  gmailLoading=true;render();
  try{
    const client=google.accounts.oauth2.initTokenClient({client_id:cid,scope:'https://www.googleapis.com/auth/gmail.readonly',callback:(r)=>{
      if(r.error){gmailLoading=false;render();alert('Fehler: '+r.error);return;}
      gmailToken=r.access_token;localStorage.setItem('gmail_token',gmailToken);localStorage.setItem('gmail_token_exp',Date.now()+(r.expires_in-60)*1000);
      gmailLoading=false;fetchGmailEmails();
    }});
    client.requestAccessToken();
  }catch(e){gmailLoading=false;render();alert('Fehler: '+e.message);}
}
async function fetchGmailEmails(){
  if(!gmailToken)return;gmailLoading=true;render();
  try{
    const r1=await fetch('https://gmail.googleapis.com/gmail/v1/users/me/messages?maxResults=20&q=in:inbox',{headers:{Authorization:'Bearer '+gmailToken}});
    if(r1.status===401){disconnectGmail();return;}
    const d1=await r1.json();
    const details=await Promise.all((d1.messages||[]).map(m=>fetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages/${m.id}?format=metadata&metadataHeaders=From&metadataHeaders=Subject&metadataHeaders=Date`,{headers:{Authorization:'Bearer '+gmailToken}}).then(r=>r.json())));
    gmailEmails=details.map(m=>{
      const hdrs=m.payload?.headers||[];const get=n=>hdrs.find(h=>h.name===n)?.value||'';
      const fromRaw=get('From');const fromName=fromRaw.replace(/<[^>]+>/,'').replace(/"/g,'').trim()||fromRaw;
      const d=new Date(get('Date'));const now=new Date();
      const time=d.toDateString()===now.toDateString()?d.toLocaleTimeString('de-CH',{hour:'2-digit',minute:'2-digit'}):d.toLocaleDateString('de-CH',{day:'numeric',month:'short'});
      return{from:fromName,subject:get('Subject')||'(kein Betreff)',preview:m.snippet||'',time,read:!(m.labelIds||[]).includes('UNREAD')};
    });
    localStorage.setItem('dn_gmail_emails',JSON.stringify(gmailEmails));
  }catch(e){console.error(e);}
  gmailLoading=false;render();
}

// ── KALENDER ──
function rCal(){
  const cid=localStorage.getItem('outlook_client_id')||'';
  const connected=!!outlookToken;
  let html='';

  if(!cid){
    html=`<div class="setup">
      <div class="setup-icon">📅</div>
      <h3>Outlook Kalender verbinden</h3>
      <p>Gib deine Microsoft Azure App Client ID ein.</p>
      <ol>
        <li>Gehe auf <code>portal.azure.com</code></li>
        <li>Azure Active Directory → App-Registrierungen</li>
        <li>Neue Registrierung → Typ: <code>SPA</code></li>
        <li>Umleitungs-URI: <code>${location.origin+location.pathname}</code></li>
        <li>API-Berechtigungen: <code>Calendars.Read</code></li>
      </ol>
      <input class="setup-inp" id="o-cid" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" />
      <button class="btn btn-blue" onclick="saveOutlookCID()" style="width:100%">Speichern &amp; verbinden</button>
    </div>`;
  } else {
    html=`<div class="sbar">
      <span class="${connected?'don':'doff'}"></span>
      <span class="st">${connected?'Outlook verbunden':'Nicht verbunden'}</span>
      ${connected
        ?`<button class="btn btn-sm" style="margin-left:auto;background:var(--surface);color:var(--t2);border:1px solid var(--border)" onclick="fetchOutlookCal()">🔄</button>
           <button class="btn btn-sm" style="background:var(--surface);color:var(--red);border:1px solid var(--border)" onclick="disconnectOutlook()">Trennen</button>`
        :`<button class="btn btn-blue btn-sm" style="margin-left:auto" onclick="connectOutlook()">${outlookLoading?'<span class="spinner"></span>':''}Verbinden</button>`
      }
    </div>
    <div style="padding:4px 16px 0"><span onclick="changeOutlookSettings()" style="font-size:11px;color:var(--t3);cursor:pointer;text-decoration:underline">Client ID ändern</span></div>`;
  }

  const manualKey='dn_ev_'+calOff;
  const manualEvs=JSON.parse(localStorage.getItem(manualKey)||'[]');
  const outEvs=outlookEvents.filter(e=>e.dayOffset===calOff);
  const appleEvs=appleEvents.filter(e=>e.dayOffset===calOff);
  const allEvs=[...outEvs,...appleEvs,...manualEvs].sort((a,b)=>a.time.localeCompare(b.time));

    ${appleCount>0?`<button class="btn btn-sm" style="background:var(--surface);color:var(--red);border:1px solid var(--border)" onclick="clearAppleCal()">✕</button>`:''}
  </div>`;

  html+=appleBar;

  html+=`<div class="dnav">
    <button class="dnbtn" onclick="calOff--;render()">‹</button>
    <span class="dlbl">${dayLabel(calOff)}</span>
    <button class="dnbtn" onclick="calOff++;render()">›</button>
  </div>`;

  const evHtml=allEvs.length?allEvs.map((e,i)=>{
    const col=e.src==='outlook'?'#3B7BF8':e.src==='homework'?'#8B5CF6':e.src==='apple'?'#10B981':'#6366F1';
    return`<div class="ci">
      <div class="ci-time"><div class="ci-h">${e.time}</div><div class="ci-e">${e.end||''}</div></div>
      <div class="ci-stripe" style="background:${col}"></div>
      <div class="ci-body">
        <div class="ci-title">${esc(e.title)}</div>
        <div class="ci-meta">${e.location?'📍 '+esc(e.location)+'&nbsp;&nbsp;':''}<span class="badge b-gr" style="font-size:10px">${e.src==='outlook'?'Outlook':e.src==='homework'?'Aufgabe':e.src==='apple'?'🍎 Apple':'Manuell'}</span></div>
      </div>
      ${e.src!=='outlook'&&e.src!=='homework'&&e.src!=='apple'?`<button class="del" onclick="delEv(${i},'${manualKey}')">✕</button>`:''}
    </div>`;
  }).join(''):`<div class="empty"><span class="empty-icon">☀️</span>Keine Termine heute.<br>Genieße den freien Tag!</div>`;

  html+=`<div class="card">${evHtml}</div>
  <div style="padding:4px 16px 8px;display:flex;gap:8px;align-items:center">
    <button class="btn" onclick="showAddEvent()">+ Termin hinzufügen</button>
  </div>

    <div style="font-size:11px;color:var(--t3);line-height:1.6">
      💡 <strong>Apple Kalender importieren:</strong> Auf dem Mac → Kalender App → Ablage → Exportieren → Als .ics speichern → hier hochladen
    </div>
  </div>`;
  return html;
}

function saveOutlookCID(){const v=document.getElementById('o-cid')?.value?.trim();if(!v)return;localStorage.setItem('outlook_client_id',v);connectOutlook();}
function changeOutlookSettings(){localStorage.removeItem('outlook_client_id');localStorage.removeItem('outlook_token');localStorage.removeItem('outlook_token_exp');outlookToken=null;outlookEvents=[];render();}
function disconnectOutlook(){localStorage.removeItem('outlook_token');localStorage.removeItem('outlook_token_exp');localStorage.removeItem('dn_outlook_ev');outlookToken=null;outlookEvents=[];msalInst=null;render();}
async function connectOutlook(){
  const cid=localStorage.getItem('outlook_client_id');if(!cid)return;
  if(typeof msal==='undefined'){alert('Microsoft-Script lädt noch. Bitte warten.');return;}
  outlookLoading=true;render();
  try{
    msalInst=new msal.PublicClientApplication({auth:{clientId:cid,authority:'https://login.microsoftonline.com/common',redirectUri:location.origin+location.pathname},cache:{cacheLocation:'localStorage'}});
    await msalInst.initialize();
    const resp=await msalInst.loginPopup({scopes:['Calendars.Read','User.Read']});
    outlookToken=resp.accessToken;localStorage.setItem('outlook_token',outlookToken);localStorage.setItem('outlook_token_exp',Date.now()+3500*1000);
    outlookLoading=false;await fetchOutlookCal();
  }catch(e){outlookLoading=false;render();if(e.errorCode!=='user_cancelled')alert('Fehler: '+e.message);}
}
async function fetchOutlookCal(){
  if(!outlookToken)return;outlookLoading=true;render();
  try{
    const start=new Date();start.setHours(0,0,0,0);const end=new Date(start);end.setDate(end.getDate()+14);
    const r=await fetch(`https://graph.microsoft.com/v1.0/me/calendarview?startDateTime=${start.toISOString()}&endDateTime=${end.toISOString()}&$orderby=start/dateTime&$top=50`,{headers:{Authorization:'Bearer '+outlookToken}});
    if(r.status===401){disconnectOutlook();return;}
    const d=await r.json();const today=new Date();today.setHours(0,0,0,0);
    outlookEvents=(d.value||[]).map(ev=>{
      const s=new Date(ev.start.dateTime||ev.start.date);const e2=new Date(ev.end.dateTime||ev.end.date);
      const diff=Math.round((new Date(s.toDateString())-today)/(86400000));
      return{title:ev.subject||'(kein Titel)',time:s.toLocaleTimeString('de-CH',{hour:'2-digit',minute:'2-digit'}),end:e2.toLocaleTimeString('de-CH',{hour:'2-digit',minute:'2-digit'}),location:ev.location?.displayName||'',dayOffset:diff,src:'outlook'};
    });
    localStorage.setItem('dn_outlook_ev',JSON.stringify(outlookEvents));
  }catch(e){console.error(e);}
  outlookLoading=false;render();
}
function delEv(i,key){const evs=JSON.parse(localStorage.getItem(key)||'[]');evs.splice(i,1);localStorage.setItem(key,JSON.stringify(evs));render();}

// ── Sync HW ↔ Kalender ──
function weekdayOffset(name){
  const map={Montag:1,Dienstag:2,Mittwoch:3,Donnerstag:4,Freitag:5,Samstag:6,Sonntag:0};
  const target=map[name];if(target===undefined)return 0;
  const today=new Date().getDay();
  let diff=target-today;
  if(diff<=0)diff+=7;
  return diff;
}
function addHWToCal(entry){
  const offset=weekdayOffset(entry.due);
  const key='dn_ev_'+offset;
  const evs=JSON.parse(localStorage.getItem(key)||'[]');
  // avoid duplicates
  const exists=evs.find(e=>e.hwId===entry.id);
  if(!exists){
    const typeLabel=entry.prio==='pruefung'?'🔴 Prüfung':entry.prio==='lernen'?'📚 Lernen':'📝 HA';
    evs.push({title:`${typeLabel} ${entry.subject}: ${entry.title}`,time:'08:00',end:'17:30',location:'',src:'homework',hwId:entry.id});
    evs.sort((a,b)=>a.time.localeCompare(b.time));
    localStorage.setItem(key,JSON.stringify(evs));
  }
}
function removeHWFromCal(hwId,dueName){
  // try all offsets 0-13 to be safe
  for(let o=0;o<=13;o++){
    const key='dn_ev_'+o;
    const evs=JSON.parse(localStorage.getItem(key)||'[]');
    const filtered=evs.filter(e=>e.hwId!==hwId);
    if(filtered.length!==evs.length)localStorage.setItem(key,JSON.stringify(filtered));
  }
  // also negative offsets
  for(let o=-7;o<0;o++){
    const key='dn_ev_'+o;
    const evs=JSON.parse(localStorage.getItem(key)||'[]');
    const filtered=evs.filter(e=>e.hwId!==hwId);
    if(filtered.length!==evs.length)localStorage.setItem(key,JSON.stringify(filtered));
  }
}

// ── Utils ──
function dayLabel(o){
  const d=new Date();d.setDate(d.getDate()+o);
  const D=['So','Mo','Di','Mi','Do','Fr','Sa'];const M=['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
  const pre=o===0?'Heute':o===1?'Morgen':o===-1?'Gestern':D[d.getDay()]+'.';
  return pre+', '+d.getDate()+'. '+M[d.getMonth()];
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

  }
}

function openProfileModal(){
  const existing=document.getElementById('profile-m');
  if(existing)return;
  const img=localStorage.getItem('profile_img')||'';
  const initials=localStorage.getItem('profile_initials')||'JO';
  const name=localStorage.getItem('profile_name')||'';
  const m=document.createElement('div');
  m.className='mov';m.id='profile-m';
  m.innerHTML=`<div class="modal">
    <div class="modal-handle"></div>
    <h3>Profil anpassen</h3>

    <!-- Vorschau -->
    <div style="display:flex;justify-content:center;margin-bottom:20px">
      <div style="position:relative;width:80px;height:80px">
        <div style="position:absolute;inset:-4px;border-radius:50%;background:conic-gradient(from 0deg,transparent 60%,rgba(99,102,241,0.9),rgba(59,123,248,1),transparent);animation:ringRotate 3s linear infinite;z-index:0"></div>
        <div style="position:absolute;inset:-2px;border-radius:50%;background:#0A1628;z-index:0"></div>
        <div id="av-preview" style="position:relative;z-index:1;width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#3B7BF8,#6366F1,#8B5CF6);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;color:#fff;background-size:cover;background-position:center;overflow:hidden;font-family:inherit">
          ${img?`<img src="${img}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`:`<span id="av-prev-txt">${initials}</span>`}
        </div>
        <div style="position:absolute;bottom:2px;right:2px;width:16px;height:16px;border-radius:50%;background:#22C55E;border:2.5px solid #0A1628;z-index:2"></div>
      </div>
    </div>

    <!-- Foto hochladen -->
    <div style="margin-bottom:14px">
      <div style="font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px">Profilbild</div>
      <div style="display:flex;gap:8px">
        <button class="mbtn mok" style="flex:1;padding:11px" onclick="document.getElementById('img-upload').click()">📷 Foto wählen</button>
        <button class="mbtn mc" style="flex:1;padding:11px" onclick="removeProfileImg()">✕ Entfernen</button>
      </div>
      <input type="file" id="img-upload" accept="image/*" style="display:none" onchange="handleImgUpload(event)">
    </div>

    <!-- Name -->
    <div style="margin-bottom:14px">
      <div style="font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px">Dein Name</div>
      <input class="m-in" id="name-inp" placeholder="z.B. Joel" value="${esc(name)}" style="margin-bottom:0">
    </div>

    <!-- Kürzel -->
    <div style="margin-bottom:16px">
      <div style="font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px">Kürzel (z.B. JO)</div>
      <input class="m-in" id="initials-inp" maxlength="3" placeholder="JO" value="${initials}" oninput="updatePreview()" style="text-transform:uppercase;font-size:18px;font-weight:800;text-align:center;letter-spacing:2px">
    </div>

    <div class="mbtns">
      <button class="mbtn mc" onclick="closeProfileModal()">Abbrechen</button>
      <button class="mbtn mok" onclick="saveProfile()">Speichern</button>
    </div>
  </div>`;
  document.querySelector('.app').appendChild(m);
  setTimeout(()=>document.getElementById('initials-inp')?.focus(),80);
}

function updatePreview(){
  const val=(document.getElementById('initials-inp')?.value||'').toUpperCase();
  const txt=document.getElementById('av-prev-txt');
  if(txt)txt.textContent=val;
}

function handleImgUpload(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const src=ev.target.result;
    const prev=document.getElementById('av-preview');
    if(prev){
      prev.style.backgroundImage=`url(${src})`;
      prev.innerHTML=`<img src="${src}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
    }
    window._tempImg=src;
  };
  reader.readAsDataURL(file);
}

function removeProfileImg(){
  window._tempImg=null;
  const prev=document.getElementById('av-preview');
  const initials=(document.getElementById('initials-inp')?.value||'JO').toUpperCase();
  if(prev){
    prev.style.backgroundImage='';
    prev.innerHTML=`<span id="av-prev-txt">${initials}</span>`;
  }
}

function saveProfile(){
  const initials=(document.getElementById('initials-inp')?.value||'JO').toUpperCase().slice(0,3);
  const name=document.getElementById('name-inp')?.value?.trim()||'';
  localStorage.setItem('profile_initials',initials);
  localStorage.setItem('profile_name',name);
  if(window._tempImg===null){
    localStorage.removeItem('profile_img');
  } else if(window._tempImg){
    localStorage.setItem('profile_img',window._tempImg);
  }
  window._tempImg=undefined;
  closeProfileModal();
  loadProfile();
  updateGreeting();
}

function closeProfileModal(){
  document.getElementById('profile-m')?.remove();
  window._tempImg=undefined;
}

// ── APPLE CALENDAR (ICS Import) ──
function importICS(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const text=ev.target.result;
    const events=parseICS(text);
    appleEvents=events;
    localStorage.setItem('dn_apple_ev',JSON.stringify(appleEvents));
    e.target.value='';
    render();
  };
  reader.readAsText(file);
}

function parseICS(text){
  const events=[];
  const today=new Date();today.setHours(0,0,0,0);
  const blocks=text.split('BEGIN:VEVENT');
  blocks.slice(1).forEach(block=>{
    const get=key=>{const m=block.match(new RegExp(key+'[^:]*:([^\\r\\n]+)'));return m?m[1].trim():''};
    const title=get('SUMMARY')||'(kein Titel)';
    const location=get('LOCATION')||'';
    const dtstart=get('DTSTART');
    const dtend=get('DTEND');
    if(!dtstart)return;
    const parseDate=s=>{
      // Format: 20240115T090000Z or 20240115T090000 or 20240115
      s=s.replace(/[TZ]/g,' ').trim();
      if(s.length>=15){
        return new Date(s.slice(0,4)+'-'+s.slice(4,6)+'-'+s.slice(6,8)+'T'+s.slice(9,11)+':'+s.slice(11,13)+':'+s.slice(13,15));
      }
      return new Date(s.slice(0,4)+'-'+s.slice(4,6)+'-'+s.slice(6,8));
    };
    const start=parseDate(dtstart);
    const end=dtend?parseDate(dtend):null;
    if(isNaN(start.getTime()))return;
    const startDay=new Date(start);startDay.setHours(0,0,0,0);
    const diff=Math.round((startDay-today)/(86400000));
    if(diff>=-1&&diff<=60){
      events.push({
        title,location,
        time:start.toLocaleTimeString('de-CH',{hour:'2-digit',minute:'2-digit'}),
        end:end?end.toLocaleTimeString('de-CH',{hour:'2-digit',minute:'2-digit'}):'',
        dayOffset:diff,src:'apple'
      });
    }
  });
  return events;
}

function clearAppleCal(){
  appleEvents=[];localStorage.removeItem('dn_apple_ev');render();
}
